name: Build SibillaOS ISO

on:
  push:
    branches: [main, "release/*"]
    tags: ["v*"]
  pull_request:

# least-privilege default token; the jobs that publish release assets
# override this with contents: write at job level
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck iso/build.sh packages/build-debs.sh cloud/build-cloud.sh apt/build-repo.sh \
            packages/llmd-hw/usr/lib/llmd/* packages/llmd-hw/usr/bin/* \
            packages/llmd-firstboot/usr/lib/llmd/* \
            packages/llmd-gateway/usr/lib/llmd/* packages/llmd-gateway/usr/bin/* \
            packages/llmd-webui/usr/bin/* packages/llmd-mcp/usr/bin/*
          # the MCP server is python: syntax-check it here too
          python3 -m py_compile packages/llmd-mcp/usr/lib/llmd/llmd-mcp-server
      - name: Validate catalog JSON
        run: |
          jq empty catalog/models.json
          # recorded digests must be well-formed sha256 values
          jq -e '[.models[].digests? // {} | to_entries[] | .value
                  | select(test("^sha256:[0-9a-f]{64}$") | not)] | length == 0' \
            catalog/models.json >/dev/null || { echo "malformed digest in catalog"; exit 1; }
          # when the maintainer signature and the project key exist,
          # the catalog must verify
          if [ -f catalog/models.json.asc ] && [ -f apt/sibillaos-archive-key.asc ]; then
            gpg --batch --yes --dearmor -o /tmp/sibilla-kr.gpg apt/sibillaos-archive-key.asc
            gpgv --keyring /tmp/sibilla-kr.gpg catalog/models.json.asc catalog/models.json
          else
            echo "catalog signature not present yet (transitional)"
          fi
      - name: Validate cloud-init YAML
        run: |
          python3 -c "import yaml; yaml.safe_load(open('cloud/bake/user-data').read().replace('#cloud-config','',1))"
          python3 -c "import yaml; yaml.safe_load(open('iso/autoinstall/user-data').read().replace('#cloud-config','',1))"
      - name: Validate rendered Caddyfiles
        # render every gateway mode with the real script and let caddy
        # parse and provision the result
        run: |
          sudo apt-get install -y caddy
          export LLMD_GATEWAY_CONF="$RUNNER_TEMP/gateway.conf"
          export LLMD_CADDYFILE="$RUNNER_TEMP/Caddyfile"
          export LLMD_ENGINE_FILE="$RUNNER_TEMP/engine"
          export LLMD_ACCESS_LOG="$RUNNER_TEMP/access.log"
          export LLMD_MCP_FILE="$RUNNER_TEMP/mcp"
          export LLMD_KEYS_ALT="lintkey1|lintkey2"
          echo ollama > "$LLMD_ENGINE_FILE"
          echo off > "$LLMD_MCP_FILE"
          for conf in 'MODE=http' \
                      'MODE=http\nMETRICS=on' \
                      'MODE=internal\nTLS_HOSTNAME=sibillaos.test' \
                      'MODE=internal\nTLS_HOSTNAME=sibillaos.test\nMETRICS=on' \
                      'MODE=acme\nTLS_HOSTNAME=example.org\nACME_EMAIL=ops@example.org'; do
            printf "$conf\n" > "$LLMD_GATEWAY_CONF"
            bash packages/llmd-gateway/usr/lib/llmd/llmd-gateway-render
            caddy validate --adapter caddyfile --config "$LLMD_CADDYFILE"
          done
          # the MCP route must render, validate, and sit inside the
          # route block (behind the 401), never before it
          echo on > "$LLMD_MCP_FILE"
          printf 'MODE=http\nMETRICS=on\n' > "$LLMD_GATEWAY_CONF"
          bash packages/llmd-gateway/usr/lib/llmd/llmd-gateway-render
          caddy validate --adapter caddyfile --config "$LLMD_CADDYFILE"
          grep -q "reverse_proxy /mcp 127.0.0.1:8765" "$LLMD_CADDYFILE"
          awk '/route \{/{r=1} /respond @unauthorized/{if(r)a=NR} /reverse_proxy \/mcp/{m=NR}
               END{exit !(a && m && m > a)}' "$LLMD_CADDYFILE" \
            || { echo "MCP route is not behind the 401"; exit 1; }
      - name: Validate Quadlet units
        # dry-run the podman systemd generator against our .container
        # files; a unit that fails to convert would be silently absent
        # on the installed system
        run: |
          command -v podman >/dev/null || sudo apt-get install -y podman
          QDIR="$RUNNER_TEMP/quadlet"
          mkdir -p "$QDIR"
          cp packages/llmd-engine-vllm/etc/containers/systemd/vllm.container \
             packages/llmd-webui/etc/containers/systemd/webui.container "$QDIR/"
          GEN=/usr/lib/systemd/system-generators/podman-system-generator
          out=$(QUADLET_UNIT_DIRS="$QDIR" "$GEN" -dryrun 2>&1) || { echo "$out"; exit 1; }
          echo "$out" | grep -q "vllm.service" || { echo "vllm quadlet did not convert"; echo "$out"; exit 1; }
          echo "$out" | grep -q "webui.service" || { echo "webui quadlet did not convert"; echo "$out"; exit 1; }

  build:
    needs: lint
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso
      - name: Cache Ubuntu source ISO
        uses: actions/cache@v4
        with:
          path: work/*.iso
          key: ubuntu-2404-live-server-amd64
      - name: Build llmd-* debs
        # on tags the deb version follows the release, so installed
        # systems see upgrades in the APT repo
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            export LLMD_VERSION="${GITHUB_REF_NAME#v}"
          fi
          bash ./packages/build-debs.sh
      - name: Build ISO
        # the small-model override keeps the install test fast; it is
        # NOT applied on tag builds, so released ISOs stay clean
        env:
          SIBILLA_TEST_MODEL: ${{ startsWith(github.ref, 'refs/tags/') && '' || 'hf.co/bartowski/Qwen_Qwen3-0.6B-GGUF:Q4_K_M' }}
        run: bash ./iso/build.sh
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: sibillaos-iso
          path: out/*.iso
          retention-days: 14
      - name: Generate checksums
        run: |
          cd out
          sha256sum ./*.iso > SHA256SUMS
      - name: Prepare release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -f "docs/releases/${GITHUB_REF_NAME}.md" ]; then
            cp "docs/releases/${GITHUB_REF_NAME}.md" RELEASE_NOTES.md
          else
            echo "SibillaOS ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          fi
          # GitHub release assets are hard-capped at 2 GiB, so the ISO is
          # published in parts; reassembly is a single cat command
          cd out
          ISO=$(ls ./*.iso | head -1)
          split -b 1900M -d "$ISO" "$ISO.part"
          sha256sum ./*.part* >> SHA256SUMS
      - name: Publish release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            out/*.part*
            out/SHA256SUMS
          generate_release_notes: true

  boot-test:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: sibillaos-iso
          path: iso
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 socat xorriso ovmf
      - name: Inspect ISO boot records
        run: |
          ISO=$(ls iso/*.iso | head -1)
          xorriso -indev "$ISO" -report_el_torito plain -report_system_area plain || true
      - name: Boot smoke test (BIOS)
        run: |
          ISO=$(ls iso/*.iso | head -1)
          KVM=""
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            KVM="-enable-kvm -cpu host"
            echo "KVM available"
          else
            echo "KVM not available, using TCG"
          fi
          # shellcheck disable=SC2086
          qemu-system-x86_64 -m 2048 $KVM -display none -vga std \
            -monitor unix:mon.sock,server,nowait \
            -serial file:serial.log -cdrom "$ISO" -boot d &
          QPID=$!
          ok=0
          for i in $(seq 1 60); do
            sleep 5
            if [ "$i" -eq 6 ]; then
              echo screendump screen-30s.ppm | socat - unix-connect:mon.sock || true
            fi
            if grep -q "Linux version" serial.log 2>/dev/null; then
              ok=1
              break
            fi
          done
          echo screendump screen-final.ppm | socat - unix-connect:mon.sock || true
          sleep 2
          kill "$QPID" 2>/dev/null || true
          echo "--- serial log ---"
          cat serial.log || true
          grep -q "Loading SibillaOS kernel" serial.log || echo "GRUB menu marker not on serial (non-fatal)"
          test "$ok" -eq 1
      - name: Boot smoke test (UEFI)
        run: |
          ISO=$(ls iso/*.iso | head -1)
          KVM=""
          if [ -e /dev/kvm ]; then
            KVM="-enable-kvm -cpu host"
          fi
          # shellcheck disable=SC2086
          qemu-system-x86_64 -m 2048 $KVM -display none \
            -bios /usr/share/ovmf/OVMF.fd \
            -serial file:uefi-serial.log -cdrom "$ISO" -boot d &
          QPID=$!
          ok=0
          for _ in $(seq 1 60); do
            sleep 5
            if grep -q "Linux version" uefi-serial.log 2>/dev/null; then
              ok=1
              break
            fi
          done
          kill "$QPID" 2>/dev/null || true
          echo "--- UEFI serial log ---"
          cat uefi-serial.log || true
          test "$ok" -eq 1
      - name: Boot smoke test (UEFI Secure Boot)
        # the repack must preserve Ubuntu's signed shim/GRUB chain:
        # boot with the secboot OVMF build and Microsoft-enrolled
        # variables, and require the kernel itself to report that
        # Secure Boot is active
        run: |
          ISO=$(ls iso/*.iso | head -1)
          CODE=/usr/share/OVMF/OVMF_CODE_4M.secboot.fd
          VARS=/usr/share/OVMF/OVMF_VARS_4M.ms.fd
          if [ ! -f "$CODE" ] || [ ! -f "$VARS" ]; then
            echo "OVMF secure boot images not found; available files:"
            ls -la /usr/share/OVMF/
            exit 1
          fi
          cp "$VARS" sb-vars.fd
          KVM=""
          if [ -e /dev/kvm ]; then
            KVM="-enable-kvm -cpu host"
          fi
          # shellcheck disable=SC2086
          qemu-system-x86_64 -m 2048 $KVM -display none \
            -machine q35,smm=on \
            -global driver=cfi.pflash01,property=secure,value=on \
            -drive if=pflash,format=raw,unit=0,readonly=on,file="$CODE" \
            -drive if=pflash,format=raw,unit=1,file=sb-vars.fd \
            -serial file:sb-serial.log -cdrom "$ISO" -boot d &
          QPID=$!
          ok=0
          for _ in $(seq 1 60); do
            sleep 5
            if grep -q "Linux version" sb-serial.log 2>/dev/null; then
              ok=1
              break
            fi
          done
          kill "$QPID" 2>/dev/null || true
          echo "--- Secure Boot serial log ---"
          cat sb-serial.log || true
          grep -qi "secure boot enabled" sb-serial.log \
            || { echo "kernel did not report Secure Boot enabled"; exit 1; }
          test "$ok" -eq 1
      - name: Upload boot debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-debug
          path: |
            serial.log
            uefi-serial.log
            sb-serial.log
            screen-*.ppm

  install-test:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: sibillaos-iso
          path: iso
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils sshpass jq
      - name: Run automated install
        run: |
          ISO=$(ls iso/*.iso | head -1)
          KVM=""
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            KVM="-enable-kvm -cpu host"
          fi
          qemu-img create -f qcow2 disk.qcow2 25G
          # -no-reboot: QEMU exits when the installer reboots, which marks
          # the end of the install phase
          RC=0
          # shellcheck disable=SC2086
          timeout 2700 qemu-system-x86_64 -m 4096 -smp 2 $KVM \
            -display none \
            -serial file:install.log \
            -drive file=disk.qcow2,format=qcow2,if=virtio \
            -cdrom "$ISO" -boot d -no-reboot || RC=$?
          echo "--- install log (tail) ---"
          tail -150 install.log || true
          # the error-commands power the VM off on failure, so a clean
          # qemu exit is not enough: the failure marker decides
          if grep -q "SIBILLA INSTALL FAILED" install.log; then
            echo "installer reported failure"
            exit 1
          fi
          exit "$RC"
      - name: Boot installed system, probe the gateway, run inference
        run: |
          KVM=""
          if [ -e /dev/kvm ]; then
            # a fixed CPU model instead of -cpu host: the runner fleet
            # is heterogeneous and llama.cpp's runtime CPU dispatch
            # segfaulted on some newer hosts; Haswell has AVX2 and is
            # satisfiable on every Intel and AMD runner
            KVM="-enable-kvm -cpu Haswell-noTSX-IBRS"
          fi
          # shellcheck disable=SC2086
          qemu-system-x86_64 -m 4096 -smp 2 $KVM \
            -display none \
            -serial file:firstboot.log \
            -drive file=disk.qcow2,format=qcow2,if=virtio \
            -netdev user,id=n0,hostfwd=tcp::8080-:8080,hostfwd=tcp::2222-:22 \
            -device virtio-net,netdev=n0 &
          QPID=$!
          ok=0
          # the gateway comes up after the firstboot model download,
          # allow up to 40 min (user-mode networking is slow)
          for _ in $(seq 1 240); do
            sleep 10
            for scheme in https http; do
              code=$(curl -ks -o /dev/null -w '%{http_code}' "$scheme://127.0.0.1:8080/v1/models" || true)
              if [ "$code" = "401" ] || [ "$code" = "200" ]; then
                echo "gateway answered $code over $scheme"
                ok=1
                break 2
              fi
            done
          done
          RC=1
          if [ "$ok" -eq 1 ]; then
            SSH="sshpass -p sibilla ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 2222 sibilla@127.0.0.1"
            KEY=$($SSH "echo sibilla | sudo -S cat /etc/llmd/apikey" | tail -1)
            MODEL=$($SSH "echo sibilla | sudo -S cat /etc/llmd/model" | tail -1)
            echo "selected model: $MODEL"
            echo "--- ollama journal (diagnostics) ---"
            $SSH "echo sibilla | sudo -S journalctl -u ollama -n 40 --no-pager" || true
            if [ -n "$KEY" ] && [ -n "$MODEL" ]; then
              # a real chat completion through the gateway (CPU inference,
              # be patient: up to 15 minutes)
              RESP=$(curl -s -m 900 http://127.0.0.1:8080/v1/chat/completions \
                -H "Authorization: Bearer $KEY" \
                -H "Content-Type: application/json" \
                -d "{\"model\": \"$MODEL\", \"messages\": [{\"role\": \"user\", \"content\": \"Reply with one short sentence: who are you?\"}], \"max_tokens\": 600}") || true
              echo "--- gateway response ---"
              echo "$RESP" | jq . || echo "$RESP"
              # thinking models may put everything in .reasoning and leave
              # .content empty when the token budget runs out: accept either
              if echo "$RESP" | jq -e '.choices[0].message | ((.content // "") + (.reasoning // "")) | length > 0' >/dev/null; then
                echo "INFERENCE OK"
                RC=0
                # sibilla-model must exist and report the served model
                echo "--- sibilla-model status ---"
                $SSH "sibilla-model status" || RC=1
                $SSH "sibilla-model status" | grep -q "$MODEL" || { echo "sibilla-model does not report the served model"; RC=1; }
                echo "--- sibilla-model list ---"
                $SSH "sibilla-model list" || true
                # TLS path: switch the gateway to https with the local CA
                # and require a 401 with the right SNI
                echo "--- sibilla-tls check ---"
                $SSH "echo sibilla | sudo -S sibilla-tls enable sibillaos.test" || RC=1
                sleep 5
                tls_code=$(curl -ks -o /dev/null -w '%{http_code}' \
                  --resolve sibillaos.test:8080:127.0.0.1 \
                  https://sibillaos.test:8080/v1/models || true)
                echo "tls gateway answered $tls_code"
                [ "$tls_code" = "401" ] || RC=1
                # a wrong key must be rejected exactly like a missing one
                badcode=$(curl -ks -o /dev/null -w '%{http_code}' \
                  --resolve sibillaos.test:8080:127.0.0.1 \
                  -H "Authorization: Bearer not-the-key" \
                  https://sibillaos.test:8080/v1/models || true)
                echo "tls gateway answered $badcode to a wrong key"
                [ "$badcode" = "401" ] || RC=1
                # multi-model: pull a second quantization and require both
                # to be served through the gateway by name
                echo "--- multi-model check ---"
                $SSH "echo sibilla | sudo -S bash -c 'export HOME=/root; ollama pull hf.co/bartowski/Qwen_Qwen3-0.6B-GGUF:Q8_0' >/dev/null 2>&1" || RC=1
                mcount=0
                for _ in 1 2 3; do
                  mcode=$(curl -ks -o mbody.json -w '%{http_code}' \
                    --resolve sibillaos.test:8080:127.0.0.1 \
                    -H "Authorization: Bearer $KEY" \
                    https://sibillaos.test:8080/v1/models) || mcode=000
                  mcount=$(jq '.data | length' mbody.json 2>/dev/null) || mcount=0
                  mcount=${mcount:-0}
                  if [ "$mcount" -ge 2 ]; then break; fi
                  echo "models endpoint answered $mcode with $mcount model(s), retrying"
                  head -c 300 mbody.json 2>/dev/null || true
                  echo
                  sleep 10
                done
                echo "models served: $mcount"
                [ "$mcount" -ge 2 ] || RC=1
                RESP2=$(curl -ks -m 900 --resolve sibillaos.test:8080:127.0.0.1 \
                  https://sibillaos.test:8080/v1/chat/completions \
                  -H "Authorization: Bearer $KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"model\": \"hf.co/bartowski/Qwen_Qwen3-0.6B-GGUF:Q8_0\", \"messages\": [{\"role\": \"user\", \"content\": \"Say ok.\"}], \"max_tokens\": 200}") || true
                if echo "$RESP2" | jq -e '.choices[0].message | ((.content // "") + (.reasoning // "")) | length > 0' >/dev/null; then
                  echo "SECOND MODEL OK"
                else
                  echo "second model failed"
                  echo "$RESP2" | jq . || echo "$RESP2"
                  RC=1
                fi
                # model integrity: both pulled quants must match the
                # digests recorded in the catalog (ollama blob = GGUF
                # sha256), and an untagged id must report rc 2
                echo "--- model digests ---"
                $SSH "/usr/lib/llmd/llmd-model-verify hf.co/bartowski/Qwen_Qwen3-0.6B-GGUF:Q4_K_M" \
                  || { echo "digest check failed for Q4_K_M"; RC=1; }
                $SSH "/usr/lib/llmd/llmd-model-verify hf.co/bartowski/Qwen_Qwen3-0.6B-GGUF:Q8_0" \
                  || { echo "digest check failed for Q8_0"; RC=1; }
                vrc=0
                $SSH "/usr/lib/llmd/llmd-model-verify hf.co/bartowski/Qwen_Qwen3-0.6B-GGUF" || vrc=$?
                [ "$vrc" = "2" ] || { echo "untagged id should be rc 2, got $vrc"; RC=1; }
                # the connection kit must render and reference the endpoint
                echo "--- sibilla-connect ---"
                $SSH "echo sibilla | sudo -S sibilla-connect" > connect.out || RC=1
                head -12 connect.out || true
                grep -q "apiBase" connect.out || { echo "connect kit missing apiBase"; RC=1; }
                # webui plumbing: the quadlet must convert on the target
                # and the flag file must gate activation; the image pull
                # is too heavy for CI, so the service is stopped right
                # after it starts activating (the UI itself stays a
                # manual test)
                echo "--- sibilla-webui check ---"
                $SSH "systemctl cat webui.service >/dev/null" || { echo "webui quadlet did not convert"; RC=1; }
                wstate=$($SSH "systemctl is-active webui.service" || true)
                [ "$wstate" = "inactive" ] || { echo "webui running without its flag: $wstate"; RC=1; }
                $SSH "echo sibilla | sudo -S sibilla-webui enable" || RC=1
                sleep 5
                wstate=$($SSH "systemctl is-active webui.service" || true)
                echo "webui state after enable: $wstate"
                case "$wstate" in
                  active|activating) ;;
                  *) echo "webui did not start"; RC=1 ;;
                esac
                $SSH "sibilla-webui status" | grep -q "enabled:  yes" || { echo "webui status does not report enabled"; RC=1; }
                $SSH "echo sibilla | sudo -S sibilla-webui disable" || RC=1
                wstate=$($SSH "systemctl is-active webui.service" || true)
                [ "$wstate" = "inactive" ] || { echo "webui still $wstate after disable"; RC=1; }
                # vllm must stay gated off on an ollama machine
                $SSH "systemctl cat vllm.service >/dev/null" || { echo "vllm quadlet did not convert"; RC=1; }
                vstate=$($SSH "systemctl is-active vllm.service" || true)
                [ "$vstate" = "inactive" ] || { echo "vllm running on an ollama machine: $vstate"; RC=1; }
                # back to plain http: the disable path must render and
                # restart the gateway, and keep serving both models
                echo "--- sibilla-tls disable ---"
                $SSH "echo sibilla | sudo -S sibilla-tls disable" || RC=1
                sleep 5
                hcode=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/v1/models || true)
                echo "http gateway answered $hcode after disable"
                [ "$hcode" = "401" ] || RC=1
                hcount=$(curl -s -H "Authorization: Bearer $KEY" \
                  http://127.0.0.1:8080/v1/models | jq '.data | length' 2>/dev/null) || hcount=0
                hcount=${hcount:-0}
                echo "models served over http: $hcount"
                [ "$hcount" -ge 2 ] || RC=1
                # unified CLI: the health view must aggregate the stack
                # state, show the served model and exit zero
                echo "--- sibilla status ---"
                if $SSH "sibilla status" > status.out; then
                  cat status.out
                else
                  echo "sibilla status exited nonzero"
                  cat status.out || true
                  RC=1
                fi
                grep -q "gateway:.*up" status.out || { echo "status does not report the gateway up"; RC=1; }
                grep -q "$MODEL" status.out || { echo "status does not show the served model"; RC=1; }
                # prune must drop the second model and keep the served one
                echo "--- sibilla model prune ---"
                $SSH "echo sibilla | sudo -S sibilla model prune" || RC=1
                pcount=$(curl -s -H "Authorization: Bearer $KEY" \
                  http://127.0.0.1:8080/v1/models | jq '.data | length' 2>/dev/null) || pcount=0
                pcount=${pcount:-0}
                echo "models after prune: $pcount"
                [ "$pcount" -eq 1 ] || RC=1
                # the served model must survive the prune
                curl -s -H "Authorization: Bearer $KEY" http://127.0.0.1:8080/v1/models \
                  | jq -r '.data[].id' | grep -q "$MODEL" || { echo "prune removed the served model"; RC=1; }
                # security baseline: firewall active with only ssh and
                # the gateway open, unattended upgrades configured, and
                # the hardening directives still on the units
                echo "--- security baseline ---"
                $SSH "echo sibilla | sudo -S ufw status" > ufw.out || RC=1
                cat ufw.out
                grep -q "Status: active" ufw.out || { echo "ufw not active"; RC=1; }
                grep -q "8080/tcp" ufw.out || { echo "gateway port not allowed"; RC=1; }
                grep -q "3000" ufw.out && { echo "webui port open by default"; RC=1; }
                $SSH "grep -q 'Unattended-Upgrade .1.' /etc/apt/apt.conf.d/51sibilla-upgrades" \
                  || { echo "unattended upgrades config missing"; RC=1; }
                for u in ollama caddy; do
                  $SSH "systemctl show -p NoNewPrivileges $u.service" | grep -q "=yes" \
                    || { echo "$u.service lost NoNewPrivileges"; RC=1; }
                done
                $SSH "systemctl show -p ProtectSystem ollama.service" | grep -q "=strict" \
                  || { echo "ollama.service lost ProtectSystem=strict"; RC=1; }
                $SSH "systemctl show -p PrivateTmp llmd-firstboot.service" | grep -q "=yes" \
                  || { echo "llmd-firstboot.service lost its sandbox"; RC=1; }
                # informational: exposure scores for the record
                $SSH "echo sibilla | sudo -S systemd-analyze security --no-pager ollama.service 2>/dev/null" \
                  | grep -i "overall exposure" || true
                $SSH "echo sibilla | sudo -S systemd-analyze security --no-pager caddy.service 2>/dev/null" \
                  | grep -i "overall exposure" || true
                # metrics: the endpoint must appear when enabled, carry
                # caddy http series and honor the same bearer token
                echo "--- sibilla metrics ---"
                $SSH "echo sibilla | sudo -S sibilla metrics enable" || RC=1
                sleep 3
                # the API must still work with metrics on; this request
                # also warms the counters: enabling metrics restarts
                # caddy, and the prometheus client only exposes the
                # caddy_http_* series after a first completed request
                acode=$(curl -s -o /dev/null -w '%{http_code}' \
                  -H "Authorization: Bearer $KEY" http://127.0.0.1:8080/v1/models || true)
                [ "$acode" = "200" ] || { echo "api broken with metrics on: $acode"; RC=1; }
                mgcode=$(curl -s -o metrics.out -w '%{http_code}' \
                  -H "Authorization: Bearer $KEY" \
                  http://127.0.0.1:8080/metrics/gateway || true)
                if [ "$mgcode" = "200" ] && grep -q "caddy_http_" metrics.out; then
                  echo "metrics endpoint OK"
                else
                  echo "metrics endpoint answered $mgcode without caddy_http_ series"
                  head -5 metrics.out || true
                  RC=1
                fi
                mgnokey=$(curl -s -o /dev/null -w '%{http_code}' \
                  http://127.0.0.1:8080/metrics/gateway || true)
                [ "$mgnokey" = "401" ] || { echo "metrics served without key: $mgnokey"; RC=1; }
                # the metrics flag must survive a tls mode change
                $SSH "echo sibilla | sudo -S sibilla tls enable sibillaos.test" || RC=1
                sleep 5
                tmcode=$(curl -ks -o /dev/null -w '%{http_code}' \
                  --resolve sibillaos.test:8080:127.0.0.1 \
                  -H "Authorization: Bearer $KEY" \
                  https://sibillaos.test:8080/metrics/gateway || true)
                [ "$tmcode" = "200" ] || { echo "metrics lost across tls switch: $tmcode"; RC=1; }
                $SSH "echo sibilla | sudo -S sibilla tls disable" || RC=1
                sleep 5
                # api key lifecycle: add, use, revoke, rotate; runs
                # last because it rotates the default key
                echo "--- sibilla key ---"
                $SSH "echo sibilla | sudo -S sibilla key list" || RC=1
                NEWKEY=$($SSH "echo sibilla | sudo -S sibilla key add ci-extra" | tail -1)
                sleep 3
                kc=$(curl -s -o /dev/null -w '%{http_code}' \
                  -H "Authorization: Bearer $NEWKEY" http://127.0.0.1:8080/v1/models || true)
                [ "$kc" = "200" ] || { echo "added key rejected: $kc"; RC=1; }
                $SSH "echo sibilla | sudo -S sibilla key revoke ci-extra" || RC=1
                sleep 3
                kc=$(curl -s -o /dev/null -w '%{http_code}' \
                  -H "Authorization: Bearer $NEWKEY" http://127.0.0.1:8080/v1/models || true)
                [ "$kc" = "401" ] || { echo "revoked key still accepted: $kc"; RC=1; }
                kc=$(curl -s -o /dev/null -w '%{http_code}' \
                  -H "Authorization: Bearer $KEY" http://127.0.0.1:8080/v1/models || true)
                [ "$kc" = "200" ] || { echo "default key broken after revoke: $kc"; RC=1; }
                OLDKEY=$KEY
                $SSH "echo sibilla | sudo -S sibilla key rotate" >/dev/null || RC=1
                sleep 3
                KEY=$($SSH "echo sibilla | sudo -S cat /etc/llmd/apikey" | tail -1)
                kc=$(curl -s -o /dev/null -w '%{http_code}' \
                  -H "Authorization: Bearer $OLDKEY" http://127.0.0.1:8080/v1/models || true)
                [ "$kc" = "401" ] || { echo "old default still accepted after rotate: $kc"; RC=1; }
                kc=$(curl -s -o /dev/null -w '%{http_code}' \
                  -H "Authorization: Bearer $KEY" http://127.0.0.1:8080/v1/models || true)
                [ "$kc" = "200" ] || { echo "rotated default rejected: $kc"; RC=1; }
                # structured access log on the gateway
                $SSH "echo sibilla | sudo -S grep -q '/v1/models' /var/log/caddy/sibilla-access.log" \
                  || { echo "access log missing or empty"; RC=1; }
                # supply chain inputs: the installed package inventory
                # feeds the SBOM and CVE scan job
                echo "--- package inventory ---"
                $SSH "dpkg-query -W -f='\${Package}\t\${Version}\t\${Architecture}\n'" > installed-packages.tsv || RC=1
                echo "$(wc -l < installed-packages.tsv) packages installed"
                $SSH "cat /var/lib/dpkg/status" > dpkg-status || RC=1
                $SSH "cat /etc/os-release" > os-release || RC=1
              else
                echo "inference failed: empty or malformed response"
              fi
            else
              echo "could not read api key or model over ssh"
            fi
          fi
          echo "--- firstboot log (tail) ---"
          tail -100 firstboot.log || true
          kill "$QPID" 2>/dev/null || true
          grep -q "SibillaOS is ready" firstboot.log && echo "firstboot marker found" || echo "firstboot marker NOT found"
          exit "$RC"
      - name: Upload install debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-debug
          path: |
            install.log
            firstboot.log
      - name: Upload installed-system inventory
        uses: actions/upload-artifact@v4
        with:
          name: install-inventory
          path: |
            installed-packages.tsv
            dpkg-status
            os-release

  apt-install-test:
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build debs and a local apt repo
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils jq
          bash ./packages/build-debs.sh
          mkdir -p localrepo
          cp packages/dist/*.deb localrepo/
          ( cd localrepo && apt-ftparchive packages . > Packages && apt-ftparchive release . > Release )
      - name: Install llmd like a user on an existing Ubuntu box
        run: |
          echo "deb [trusted=yes] file://$(pwd)/localrepo ./" \
            | sudo tee /etc/apt/sources.list.d/sibillaos-local.list
          sudo apt-get update
          sudo apt-get install -y llmd
          command -v sibilla
      - name: sibilla setup, then a real request through the gateway
        run: |
          RC=0
          sudo sibilla setup --model hf.co/bartowski/Qwen_Qwen3-0.6B-GGUF:Q4_K_M
          # the gateway must answer on the existing box, no reinstall
          up=0
          for _ in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/v1/models || true)
            if [ "$code" = "401" ]; then up=1; break; fi
            sleep 3
          done
          [ "$up" = 1 ] || { echo "gateway never came up"; exit 1; }
          KEY=$(sudo cat /etc/llmd/apikey)
          MODEL=$(sudo cat /etc/llmd/model)
          [ -n "$KEY" ] && [ -n "$MODEL" ] || { echo "missing key or model"; exit 1; }
          # API surface is asserted
          acode=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $KEY" http://127.0.0.1:8080/v1/models || true)
          [ "$acode" = "200" ] || { echo "authenticated models call was $acode"; RC=1; }
          # inference is best-effort here (native runner CPU); assert it
          # when it works, report otherwise, do not fail the guest test
          RESP=$(curl -s -m 300 http://127.0.0.1:8080/v1/chat/completions \
            -H "Authorization: Bearer $KEY" -H "Content-Type: application/json" \
            -d "{\"model\": \"$MODEL\", \"messages\": [{\"role\": \"user\", \"content\": \"Say ok.\"}], \"max_tokens\": 50}") || true
          if echo "$RESP" | jq -e '.choices[0].message | ((.content // "") + (.reasoning // "")) | length > 0' >/dev/null 2>&1; then
            echo "SETUP INFERENCE OK"
          else
            echo "inference not asserted on this box:"; echo "$RESP" | head -c 300; echo
          fi
          # good-guest behavior: setup must not act like an appliance
          [ ! -e /etc/llmd/appliance ] || { echo "setup wrongly created the appliance marker"; RC=1; }
          if command -v ufw >/dev/null 2>&1; then
            sudo ufw status | grep -qi "Status: active" && { echo "setup enabled the firewall"; RC=1; } || true
          fi
          if [ -f /etc/apt/sources.list.d/sibillaos.sources ]; then
            grep -q '^Enabled: no' /etc/apt/sources.list.d/sibillaos.sources \
              || { echo "setup flipped the apt source on"; RC=1; }
          fi
          echo "--- sibilla status ---"
          sibilla status || RC=1
          exit "$RC"
      - name: MCP endpoint through the gateway
        run: |
          RC=0
          sudo sibilla mcp enable
          KEY=$(sudo cat /etc/llmd/apikey)
          # unauthenticated requests must die at the gateway, before
          # ever reaching the MCP server
          code=$(curl -s -o /dev/null -w '%{http_code}' -m 10 -X POST http://127.0.0.1:8080/mcp \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{}}' || true)
          [ "$code" = "401" ] || { echo "unauthenticated MCP request got $code"; RC=1; }
          mcp() {
            curl -s -m 330 -X POST http://127.0.0.1:8080/mcp \
              -H "Authorization: Bearer $KEY" \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              -d "$1"
          }
          INIT=$(mcp '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"sibillaos-ci","version":"0"}}}')
          echo "$INIT" | jq -e '.result.protocolVersion == "2025-06-18" and .result.capabilities.tools != null' >/dev/null \
            || { echo "initialize failed: $INIT"; RC=1; }
          TOOLS=$(mcp '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}')
          echo "$TOOLS" | jq -e '[.result.tools[].name] | (index("chat") != null) and (index("list_models") != null)' >/dev/null \
            || { echo "tools/list failed: $TOOLS"; RC=1; }
          LM=$(mcp '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"list_models","arguments":{}}}')
          echo "$LM" | jq -e '.result.isError == false and (.result.content[0].text | contains("default model"))' >/dev/null \
            || { echo "list_models call failed: $LM"; RC=1; }
          # chat delegates to the engine: same best-effort policy as
          # the direct inference check above (native runner CPU)
          CH=$(mcp '{"jsonrpc":"2.0","id":4,"method":"tools/call","params":{"name":"chat","arguments":{"prompt":"Say ok.","max_tokens":50}}}')
          if echo "$CH" | jq -e '.result.isError == false and (.result.content[0].text | length > 0)' >/dev/null 2>&1; then
            echo "MCP CHAT OK"
          else
            echo "mcp chat not asserted on this box:"; echo "$CH" | head -c 300; echo
          fi
          # disable must close the endpoint again
          sudo sibilla mcp disable
          code=$(curl -s -o /dev/null -w '%{http_code}' -m 10 -X POST http://127.0.0.1:8080/mcp \
            -H "Authorization: Bearer $KEY" \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":5,"method":"ping","params":{}}' || true)
          # with the route gone the request falls through to the engine,
          # which does not serve /mcp: anything but a 200 proves closure
          [ "$code" != "200" ] || { echo "MCP still answering after disable"; RC=1; }
          sudo sibilla mcp enable
          exit "$RC"
      - name: Offline model import, gated by the signed catalog
        run: |
          RC=0
          # a user on a connected machine prepares the file a USB stick
          # would carry to an air-gapped one
          curl -fL --retry 3 -o /tmp/reviewed.gguf \
            "https://huggingface.co/bartowski/Qwen_Qwen3-0.6B-GGUF/resolve/main/Qwen_Qwen3-0.6B-Q8_0.gguf"
          sudo sibilla model import /tmp/reviewed.gguf | tee import.out
          grep -q "identified: hf.co/bartowski/Qwen_Qwen3-0.6B-GGUF:Q8_0" import.out \
            || { echo "import did not identify the artifact from its digest"; RC=1; }
          grep -q "digest verified" import.out \
            || { echo "import did not verify the stored blob"; RC=1; }
          sudo HOME=/root ollama list | grep -q "Qwen_Qwen3-0.6B-GGUF:Q8_0" \
            || { echo "imported model is not in the store"; RC=1; }
          # serving an imported model must not touch the network: an
          # ollama pull would print its manifest/layer progress
          sudo sibilla model use hf.co/bartowski/Qwen_Qwen3-0.6B-GGUF:Q8_0 | tee use.out
          grep -q "now serving" use.out || { echo "use after import failed"; RC=1; }
          grep -qi "pulling" use.out && { echo "use after import pulled from the network"; RC=1; } || true
          # an artifact the catalog does not know must be refused
          head -c 1048576 /dev/urandom > /tmp/unknown.gguf
          if sudo sibilla model import /tmp/unknown.gguf >unknown.out 2>&1; then
            echo "an unreviewed artifact was accepted"; cat unknown.out; RC=1
          else
            grep -q "REFUSING to import" unknown.out \
              || { echo "unexpected refusal path:"; cat unknown.out; RC=1; }
          fi
          # back to the setup model for the steps that follow
          sudo sibilla model use hf.co/bartowski/Qwen_Qwen3-0.6B-GGUF:Q4_K_M >/dev/null
          rm -f /tmp/reviewed.gguf /tmp/unknown.gguf
          exit "$RC"
      - name: Doctor, connect --write, then a clean removal
        run: |
          RC=0
          # doctor: complete and secret-free
          sudo sibilla doctor > doctor.out || RC=1
          grep -q "engine:" doctor.out || { echo "doctor missing engine section"; RC=1; }
          grep -q "end of report" doctor.out || { echo "doctor report truncated"; RC=1; }
          KEY=$(sudo cat /etc/llmd/apikey)
          if grep -q "$KEY" doctor.out; then
            echo "doctor leaked the api key; offending lines (masked):"
            grep -F "$KEY" doctor.out | sed "s/$KEY/[REDACTED]/g" | head -5
            RC=1
          fi
          # connect --write places the Continue config for the sudo user
          sudo sibilla connect --write || RC=1
          test -f "$HOME/.continue/config.yaml" || { echo "connect --write wrote nothing"; RC=1; }
          grep -q "apiBase" "$HOME/.continue/config.yaml" || { echo "written config incomplete"; RC=1; }
          # remove: a full, verifiable teardown
          sudo sibilla remove --yes || RC=1
          dpkg -l 2>/dev/null | grep -E '^ii +llmd' && { echo "llmd packages survived"; RC=1; } || true
          [ ! -e /etc/llmd ] || { echo "/etc/llmd survived"; RC=1; }
          [ ! -e /var/lib/llmd ] || { echo "/var/lib/llmd survived"; RC=1; }
          if command -v ollama >/dev/null 2>&1; then
            echo "ollama survived (setup installed it, remove must take it)"
            RC=1
          fi
          code=$(curl -s -o /dev/null -w '%{http_code}' -m 5 http://127.0.0.1:8080/v1/models || true)
          if [ "$code" = "401" ] || [ "$code" = "200" ]; then
            echo "gateway still answering after removal"
            RC=1
          fi
          code=$(curl -s -o /dev/null -w '%{http_code}' -m 5 -X POST http://127.0.0.1:8765/mcp || true)
          [ "$code" = "000" ] || { echo "mcp server still answering after removal"; RC=1; }
          exit "$RC"

  supply-chain:
    needs: install-test
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download installed-system inventory
        uses: actions/download-artifact@v4
        with:
          name: install-inventory
          path: inventory
      - name: Install pinned SBOM and scan tools
        run: |
          mkdir -p "$HOME/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b "$HOME/bin" v1.46.0
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$HOME/bin" v0.72.0
          echo "$HOME/bin" >> "$GITHUB_PATH"
      - name: Generate the SBOM of the llmd packages
        run: |
          bash ./packages/build-debs.sh
          syft dir:packages/dist \
            -o spdx-json=sbom-llmd-packages.spdx.json \
            -o cyclonedx-json=sbom-llmd-packages.cdx.json
      - name: Scan the installed system for CVEs
        run: |
          # the dpkg status captured from the real installed system is
          # the scan input: what the machine actually runs, not a guess
          mkdir -p rootfs/var/lib/dpkg rootfs/etc
          cp inventory/dpkg-status rootfs/var/lib/dpkg/status
          cp inventory/os-release rootfs/etc/os-release
          trivy fs --scanners vuln --format table rootfs || true
          trivy fs --scanners vuln --format json -o cve-report.json rootfs
          # triage gate (docs/supply-chain.md): CRITICAL findings WITH
          # a fix available fail the build; unfixed ones are inherited
          # from the base distribution and tracked, not fatal
          fixable=$(jq '[.Results[]?.Vulnerabilities[]?
            | select(.Severity == "CRITICAL" and (.FixedVersion // "") != "")] | length' cve-report.json)
          echo "fixable critical vulnerabilities: $fixable"
          if [ "$fixable" -ne 0 ]; then
            echo "fix them or record a triaged exception in .trivyignore (see docs/supply-chain.md)"
            exit 1
          fi
      - name: Upload supply chain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain
          path: |
            sbom-llmd-packages.spdx.json
            sbom-llmd-packages.cdx.json
            cve-report.json
            inventory/installed-packages.tsv
      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom-llmd-packages.spdx.json
            sbom-llmd-packages.cdx.json
            inventory/installed-packages.tsv

  build-cloud:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            # no KVM on GitHub arm64 runners: the bake runs under TCG
            sudo apt-get install -y qemu-system-arm qemu-efi-aarch64 qemu-utils xorriso
          else
            sudo apt-get install -y qemu-system-x86 qemu-utils xorriso
          fi
          if [ -e /dev/kvm ]; then sudo chmod 666 /dev/kvm; fi
      - name: Cache Ubuntu cloud image
        uses: actions/cache@v4
        with:
          path: work-cloud/*.img
          key: ubuntu-noble-cloudimg-${{ matrix.arch }}
      - name: Build llmd-* debs
        # on tags the deb version follows the release, so installed
        # systems see upgrades in the APT repo
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            export LLMD_VERSION="${GITHUB_REF_NAME#v}"
          fi
          bash ./packages/build-debs.sh
      - name: Bake cloud image
        # same small-model override as the ISO build; never on tags
        env:
          SIBILLA_TEST_MODEL: ${{ startsWith(github.ref, 'refs/tags/') && '' || 'hf.co/bartowski/Qwen_Qwen3-0.6B-GGUF:Q4_K_M' }}
        run: bash ./cloud/build-cloud.sh
      - name: Upload bake log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-bake-log-${{ matrix.arch }}
          path: work-cloud/bake.log
      - name: Upload cloud image artifact
        uses: actions/upload-artifact@v4
        with:
          name: sibillaos-cloud-${{ matrix.arch }}
          path: out/*.qcow2
          retention-days: 14
      - name: Prepare cloud release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd out
          sha256sum ./*.qcow2 > "SHA256SUMS-cloud-${{ matrix.arch }}"
          # release assets are hard-capped at 2 GiB: split when needed
          for f in ./*.qcow2; do
            size=$(stat -c%s "$f")
            if [ "$size" -gt 1900000000 ]; then
              split -b 1900M -d "$f" "$f.part"
              rm "$f"
              sha256sum ./*.part* >> "SHA256SUMS-cloud-${{ matrix.arch }}"
            fi
          done
      - name: Attach cloud image to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.qcow2*
            out/SHA256SUMS-cloud-*

  cloud-test:
    needs: build-cloud
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            # KVM available: inference is asserted
            strict: "yes"
          - arch: arm64
            runner: ubuntu-24.04-arm
            # no KVM: TCG-emulated inference is informational only
            strict: "no"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.arch == 'arm64' && 150 || 45 }}
    steps:
      - name: Download cloud image
        uses: actions/download-artifact@v4
        with:
          name: sibillaos-cloud-${{ matrix.arch }}
          path: cloud-img
      - name: Install QEMU
        run: |
          sudo apt-get update
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y qemu-system-arm qemu-efi-aarch64 qemu-utils xorriso sshpass jq
          else
            sudo apt-get install -y qemu-system-x86 qemu-utils xorriso sshpass jq
          fi
      - name: Deploy and probe
        run: |
          IMG=$(ls cloud-img/*.qcow2 | head -1)
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            QEMU=qemu-system-aarch64
            KVM="-machine virt -cpu max -bios /usr/share/AAVMF/AAVMF_CODE.fd"
            if [ -e /dev/kvm ]; then
              sudo chmod 666 /dev/kvm
              KVM="-machine virt -enable-kvm -cpu host -bios /usr/share/AAVMF/AAVMF_CODE.fd"
            fi
          else
            QEMU=qemu-system-x86_64
            KVM=""
            if [ -e /dev/kvm ]; then
              sudo chmod 666 /dev/kvm
              # fixed CPU model: same reasoning as the install test,
              # llama.cpp segfaulted on some newer runner hosts
              KVM="-enable-kvm -cpu Haswell-noTSX-IBRS"
            fi
          fi
          # a deployer-style NoCloud seed: own user, password ssh
          mkdir seed
          cat > seed/user-data <<'EOF'
          #cloud-config
          hostname: sibilla-cloud
          ssh_pwauth: true
          users:
            - name: sibilla
              plain_text_passwd: sibilla
              lock_passwd: false
              shell: /bin/bash
              groups: sudo
              sudo: ALL=(ALL) NOPASSWD:ALL
          EOF
          printf 'instance-id: sibilla-cloud-ci\n' > seed/meta-data
          xorriso -as mkisofs -volid CIDATA -joliet -rock -o seed.iso seed
          # shellcheck disable=SC2086
          $QEMU $KVM -m 4096 -smp 4 \
            -display none -serial file:cloud.log \
            -drive "file=$IMG,format=qcow2,if=virtio" \
            -drive "file=seed.iso,format=raw,if=virtio,readonly=on" \
            -netdev user,id=n0,hostfwd=tcp::8080-:8080,hostfwd=tcp::2222-:22 \
            -device virtio-net,netdev=n0 &
          QPID=$!
          ok=0
          # first boot downloads the model; under TCG everything is
          # slower, so allow up to 40 minutes
          for _ in $(seq 1 240); do
            sleep 10
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/v1/models || true)
            if [ "$code" = "401" ]; then
              ok=1
              break
            fi
          done
          RC=1
          if [ "$ok" -eq 1 ]; then
            echo "gateway answered 401"
            SSH="sshpass -p sibilla ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 2222 sibilla@127.0.0.1"
            KEY=$($SSH "sudo cat /etc/llmd/apikey" | tail -1)
            MODEL=$($SSH "sudo cat /etc/llmd/model" | tail -1)
            echo "model: $MODEL"
            if [ -n "$KEY" ] && [ -n "$MODEL" ]; then
              RC=0
              # the API surface is asserted on every architecture
              mjson=$(curl -s -H "Authorization: Bearer $KEY" http://127.0.0.1:8080/v1/models) || true
              if echo "$mjson" | jq -e --arg m "$MODEL" '.data[] | select(.id == $m)' >/dev/null; then
                echo "served models include $MODEL"
              else
                echo "served models do not include $MODEL: $mjson"
                RC=1
              fi
              if $SSH "sibilla status"; then
                true
              else
                echo "sibilla status failed on the cloud image"
                RC=1
              fi
              # inference: asserted with KVM, informational under TCG
              # (emulated token generation is minutes per sentence)
              RESP=$(curl -s -m 1500 http://127.0.0.1:8080/v1/chat/completions \
                -H "Authorization: Bearer $KEY" \
                -H "Content-Type: application/json" \
                -d "{\"model\": \"$MODEL\", \"messages\": [{\"role\": \"user\", \"content\": \"Say ok.\"}], \"max_tokens\": 60}") || true
              if echo "$RESP" | jq -e '.choices[0].message | ((.content // "") + (.reasoning // "")) | length > 0' >/dev/null; then
                echo "CLOUD INFERENCE OK"
              else
                if [ "${{ matrix.strict }}" = "yes" ]; then
                  echo "cloud inference failed"
                  echo "$RESP" | jq . || echo "$RESP"
                  RC=1
                else
                  echo "inference not asserted on this architecture (no KVM, TCG emulation)"
                  echo "$RESP" | head -c 400 || true
                  echo
                fi
              fi
            else
              echo "could not read api key or model over ssh"
            fi
          else
            echo "gateway never came up; console tail:"
            tail -80 cloud.log || true
          fi
          kill "$QPID" 2>/dev/null || true
          exit "$RC"
      - name: Upload cloud debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-debug-${{ matrix.arch }}
          path: cloud.log
