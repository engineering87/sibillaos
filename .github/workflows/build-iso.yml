name: Build SibillaOS ISO

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck iso/build.sh packages/build-debs.sh \
            packages/llmd-hw/usr/lib/llmd/* packages/llmd-firstboot/usr/lib/llmd/*
      - name: Validate catalog JSON
        run: jq empty catalog/models.json

  build:
    needs: lint
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso mtools dosfstools grub-pc-bin grub-efi-amd64-bin grub-common
      - name: Build llmd-* debs
        run: bash ./packages/build-debs.sh
      - name: Build ISO
        run: sudo bash ./iso/build.sh
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: sibillaos-iso
          path: out/*.iso
          retention-days: 14
      - name: Generate checksums
        run: |
          cd out
          sha256sum ./*.iso > SHA256SUMS
      - name: Publish release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.iso
            out/SHA256SUMS
          generate_release_notes: true
