# SibillaOS: hardening drop-in for the Ollama service
[Service]
NoNewPrivileges=true
ProtectSystem=strict
ProtectHome=true
ReadWritePaths=/var/lib/llmd/models /usr/share/ollama
PrivateTmp=true
ProtectKernelModules=true
ProtectKernelTunables=true
ProtectControlGroups=true
RestrictSUIDSGID=true
RestrictRealtime=true
# Models live in the shared data partition
Environment=OLLAMA_MODELS=/var/lib/llmd/models/ollama
# Loopback only: external exposure goes through the gateway
Environment=OLLAMA_HOST=127.0.0.1:11434
# No cloud routing, ever: recent ollama can transparently offload
# ":cloud" models to ollama.com, which would break the core promise
# of this machine (nothing in a prompt or an answer leaves it)
Environment=OLLAMA_NO_CLOUD=1
