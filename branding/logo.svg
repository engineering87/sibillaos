<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1740"/>
      <stop offset="0.55" stop-color="#241d5c"/>
      <stop offset="1" stop-color="#120e2b"/>
    </linearGradient>
    <radialGradient id="iris" cx="0.5" cy="0.45" r="0.65">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="0.35" stop-color="#f5c542"/>
      <stop offset="0.75" stop-color="#8a63e8"/>
      <stop offset="1" stop-color="#3d2f8f"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5c542" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f5c542" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- badge -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <!-- alone dorato dietro l'occhio -->
  <circle cx="256" cy="256" r="170" fill="url(#glow)"/>

  <!-- tracce circuito: dagli angoli dell'occhio verso l'esterno -->
  <g stroke="#8a63e8" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M104 256 H60"/>
    <path d="M408 256 H452"/>
    <path d="M150 180 L118 148 V116"/>
    <path d="M362 180 L394 148 V116"/>
    <path d="M150 332 L118 364 V396"/>
    <path d="M362 332 L394 364 V396"/>
  </g>
  <g fill="#f5c542">
    <circle cx="60" cy="256" r="11"/>
    <circle cx="452" cy="256" r="11"/>
    <circle cx="118" cy="116" r="11"/>
    <circle cx="394" cy="116" r="11"/>
    <circle cx="118" cy="396" r="11"/>
    <circle cx="394" cy="396" r="11"/>
  </g>

  <!-- occhio (vesica) -->
  <path d="M104 256 Q 256 118 408 256 Q 256 394 104 256 Z"
        fill="#120e2b" stroke="#f5c542" stroke-width="14" stroke-linejoin="round"/>

  <!-- iride -->
  <circle cx="256" cy="256" r="86" fill="url(#iris)"/>
  <circle cx="256" cy="256" r="86" fill="none" stroke="#f5c542" stroke-width="6"/>

  <!-- pupilla: nodo -->
  <circle cx="256" cy="256" r="34" fill="#120e2b"/>
  <circle cx="256" cy="256" r="14" fill="#f5c542"/>

  <!-- riflesso -->
  <circle cx="222" cy="216" r="16" fill="#ffffff" opacity="0.55"/>
</svg>
