<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#0e2a1c"/>
  <!-- ouroboros: the serpent circling the eye, head meeting tail -->
  <path d="M 256 76 A 180 180 0 1 1 118 135"
        fill="none" stroke="#3ddc84" stroke-width="26" stroke-linecap="round"/>
  <!-- tapering tail -->
  <path d="M 256 76 A 180 180 0 0 0 152 109" fill="none" stroke="#2e9e63" stroke-width="14" stroke-linecap="round"/>
  <!-- serpent head -->
  <path d="M118 135 L84 96 L146 92 Z" fill="#3ddc84"/>
  <circle cx="118" cy="108" r="7" fill="#081b11"/>
  <!-- eye within -->
  <path d="M140 256 Q 256 176 372 256 Q 256 336 140 256 Z"
        fill="#081b11" stroke="#a8e063" stroke-width="16"/>
  <circle cx="256" cy="256" r="46" fill="#a8e063"/>
  <path d="M256 216 Q 268 256 256 296 Q 244 256 256 216 Z" fill="#081b11"/>
  <circle cx="256" cy="236" r="6" fill="#f5c542"/>
</svg>
