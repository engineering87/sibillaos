    <path d="M256 256 L256 176"/>
    <path d="M256 256 L325 216"/>
    <path d="M256 256 L325 296"/>
    <path d="M256 256 L256 336"/>
    <path d="M256 256 L187 296"/>
    <path d="M256 256 L187 216"/>
  </g>
  <g fill="#8a63e8">
    <circle cx="256" cy="176" r="17"/>
    <circle cx="325" cy="216" r="17"/>
    <circle cx="325" cy="296" r="17"/>
    <circle cx="256" cy="336" r="17"/>
    <circle cx="187" cy="296" r="17"/>
    <circle cx="187" cy="216" r="17"/>
  </g>
  <circle cx="256" cy="256" r="44" fill="#f5c542"/>
</svg>
