<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#1b1740"/>
  <!-- eye outline -->
  <path d="M92 256 Q 256 124 420 256 Q 256 388 92 256 Z"
        fill="none" stroke="#f5c542" stroke-width="22" stroke-linejoin="round"/>
  <!-- iris: neural ring, six nodes linked to the pupil -->
